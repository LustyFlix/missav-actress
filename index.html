<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Post Archive</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f7fb;
    margin: 0;
    padding: 20px;
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  #post-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 15px;
  }

  .card {
    background: #fff;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
  }

  .card a {
    text-decoration: none;
    color: #0077cc;
    font-weight: bold;
    word-break: break-all;
  }

  .pagination {
    margin-top: 25px;
    text-align: center;
  }

  .pagination button {
    margin: 3px;
    padding: 8px 12px;
    border: none;
    background: #0077cc;
    color: white;
    border-radius: 6px;
    cursor: pointer;
  }

  .pagination button.active {
    background: #222;
  }
</style>
</head>

<body>

<h1>📂 Post Archive</h1>

<div id="post-list">Loading...</div>
<div class="pagination" id="pagination"></div>

<script>
const PER_PAGE = 20;
let allPosts = [];
let currentPage = getPage();

// 🔥 Define available index files
const INDEX_FILES = "abcdefghijklmnopqrstuvwxyz0123456789".split("");

function getPage() {
  const params = new URLSearchParams(location.search);
  return parseInt(params.get("page")) || 1;
}

function setPage(page) {
  const params = new URLSearchParams(location.search);
  params.set("page", page);
  history.pushState({}, "", "?" + params.toString());
}

// 🚀 Load ALL index chunks (simple version)
async function loadAllIndexes() {
  let results = [];

  for (const key of INDEX_FILES) {
    try {
      const res = await fetch(`./data/index/${key}.json`);
      if (!res.ok) continue;

      const json = await res.json();
      results.push(...Object.entries(json));
    } catch {}
  }

  return results;
}

function render() {
  const list = document.getElementById("post-list");
  list.innerHTML = "";

  const totalPages = Math.ceil(allPosts.length / PER_PAGE);

  if (currentPage > totalPages) currentPage = totalPages || 1;

  const start = (currentPage - 1) * PER_PAGE;
  const end = start + PER_PAGE;

  const items = allPosts.slice(start, end);

  items.forEach(([url, path]) => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `<a href="./data/posts/${path}" target="_blank">${url}</a>`;
    list.appendChild(div);
  });

  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const container = document.getElementById("pagination");
  container.innerHTML = "";

  const prev = document.createElement("button");
  prev.textContent = "Prev";
  prev.onclick = () => {
    if (currentPage > 1) {
      currentPage--;
      setPage(currentPage);
      render();
    }
  };
  container.appendChild(prev);

  for (let i = 1; i <= Math.min(5, totalPages); i++) {
    const btn = document.createElement("button");
    btn.textContent = i;

    if (i === currentPage) btn.className = "active";

    btn.onclick = () => {
      currentPage = i;
      setPage(i);
      render();
    };

    container.appendChild(btn);
  }

  const next = document.createElement("button");
  next.textContent = "Next";
  next.onclick = () => {
    if (currentPage < totalPages) {
      currentPage++;
      setPage(currentPage);
      render();
    }
  };
  container.appendChild(next);
}

window.addEventListener("popstate", () => {
  currentPage = getPage();
  render();
});

// 🚀 INIT
loadAllIndexes().then(data => {
  allPosts = data;
  render();
});
</script>

</body>
</html>
